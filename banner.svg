<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081f3f;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0d2e5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#081f3f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="220" fill="url(#bg)" rx="12" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="900" y2="40" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="900" y2="200" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="220" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="220" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="220" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="220" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="220" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="220" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="220" stroke="#fbbf24" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="220" stroke="#fbbf24" stroke-width="0.5"/>
  </g>

  <!-- Accent bar -->
  <rect x="60" y="55" width="4" height="110" fill="url(#accent)" rx="2" />

  <!-- Name -->
  <text x="84" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Jill Ozovek</text>

  <!-- Title -->
  <text x="84" y="135" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#d97706">Fractional Head of AI Adoption</text>

  <!-- Tagline -->
  <text x="84" y="162" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="400" fill="rgba(255,255,255,0.6)">Turning AI investment into measurable productivity gains</text>

  <!-- Dots decoration right side -->
  <g opacity="0.08">
    <circle cx="720" cy="50" r="3" fill="#fbbf24"/>
    <circle cx="745" cy="50" r="3" fill="#fbbf24"/>
    <circle cx="770" cy="50" r="3" fill="#fbbf24"/>
    <circle cx="795" cy="50" r="3" fill="#fbbf24"/>
    <circle cx="820" cy="50" r="3" fill="#fbbf24"/>
    <circle cx="720" cy="75" r="3" fill="#fbbf24"/>
    <circle cx="745" cy="75" r="3" fill="#fbbf24"/>
