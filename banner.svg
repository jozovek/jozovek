    <circle cx="795" cy="100" r="3" fill="#fbbf24"/>
    <circle cx="820" cy="100" r="3" fill="#fbbf24"/>
    <circle cx="720" cy="125" r="3" fill="#fbbf24"/>
    <circle cx="745" cy="125" r="3" fill="#fbbf24"/>
    <circle cx="770" cy="125" r="3" fill="#fbbf24"/>
    <circle cx="795" cy="125" r="3" fill="#fbbf24"/>
    <circle cx="820" cy="125" r="3" fill="#fbbf24"/>
    <circle cx="720" cy="150" r="3" fill="#fbbf24"/>
    <circle cx="745" cy="150" r="3" fill="#fbbf24"/>
    <circle cx="770" cy="150" r="3" fill="#fbbf24"/>
    <circle cx="795" cy="150" r="3" fill="#fbbf24"/>
    <circle cx="820" cy="150" r="3" fill="#fbbf24"/>
    <circle cx="720" cy="175" r="3" fill="#fbbf24"/>
    <circle cx="745" cy="175" r="3" fill="#fbbf24"/>
    <circle cx="770" cy="175" r="3" fill="#fbbf24"/>
    <circle cx="795" cy="175" r="3" fill="#fbbf24"/>
    <circle cx="820" cy="175" r="3" fill="#fbbf24"/>
  </g>
</svg>